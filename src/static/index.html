<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Link - Mobile Workspace</title>
    <!-- xterm.css from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <!-- Highlight.js theme CSS -->
    <link id="hljs-theme-stylesheet" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <button id="app-chrome-toggle" class="chrome-collapse-btn" type="button" aria-label="Collapse top controls" aria-controls="top-banner project-link-panel" aria-expanded="true">▲</button>

    <header id="top-banner" class="app-chrome-section">
        <div id="top-banner-content" class="chrome-collapse-content top-banner-content">
            <h1>Gravity Link</h1>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button id="theme-toggle-btn" class="theme-btn" style="background: none; border: 1px solid var(--border-color); color: var(--text-primary); padding: 4px 8px; font-size: 0.7rem; font-family: var(--font-sans); cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 3px; outline: none; -webkit-tap-highlight-color: transparent;">Light Mode</button>
                <div class="status-indicator">
                    <span id="ws-status-dot" class="status-dot"></span>
                    <span id="ws-status-text">Disconnected</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Workspace Selector -->
    <div id="project-link-panel" class="workspace-selector-box app-chrome-section" style="display: flex; flex-direction: column; gap: 4px; padding: 4px 6px;">
        <!-- Recent Workspaces Dropdown -->
        <div id="project-link-content" class="workspace-input-group chrome-collapse-content">
            <label for="workspace-recent-select" style="font-size: 0.7rem; text-transform: uppercase; font-weight: bold; display: flex; align-items: center; width: 52px;">Project:</label>
            <input id="workspace-recent-select" class="workspace-input" list="workspace-recent-options" placeholder="Project path" style="padding: 4px; font-size: 0.75rem; cursor: text; flex: 1;" />
            <datalist id="workspace-recent-options"></datalist>
        </div>
    </div>

    <!-- Main Views -->
    <main>
        <!-- Tab 1: Terminal -->
        <div id="terminal-tab" class="tab-view active">
            <div id="terminal-container" class="terminal-container"></div>
            <!-- Mobile Terminal Keypad Helpers -->
            <div class="terminal-keypad">
                <button class="keypad-btn" data-key="Esc">ESC</button>
                <button class="keypad-btn" data-key="Tab">TAB</button>
                <button class="keypad-btn" data-key="Ctrl">CTRL</button>
                <button class="keypad-btn" data-key="ArrowUp">▲</button>
                <button class="keypad-btn" data-key="ArrowDown">▼</button>
                <button class="keypad-btn" data-key="ArrowLeft">◀</button>
                <button class="keypad-btn" data-key="ArrowRight">▶</button>
                <button class="keypad-btn" data-key="Paste" type="button" aria-label="Paste" title="Paste">
                    <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 4h8"></path>
                        <path d="M9 2h6a1 1 0 0 1 1 1v2H8V3a1 1 0 0 1 1-1z"></path>
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    </svg>
                </button>
                <button class="keypad-btn" data-key="Clear">CLS</button>
            </div>
        </div>

        <!-- Tab 2: Approvals -->
        <div id="approvals-tab" class="tab-view">
            <div id="pending-approval-container">
                <div class="idle-state">
                    Checking approval status...
                </div>
            </div>
        </div>

        <!-- Tab 3: Conversation & Tasks -->
        <div id="conversation-tab" class="tab-view">
            <!-- Dropdown selector for conversations -->
            <div class="workspace-selector-box conversation-session-bar" style="border-bottom: 1px solid var(--border-muted); margin-bottom: 4px; padding: 2px 4px; display: flex; align-items: center; justify-content: space-between; gap: 4px;">
                <div class="workspace-input-group conversation-session-picker" style="display: flex; flex: 1 1 auto; min-width: 0; margin: 0;">
                    <label for="conversation-select" style="font-size: 0.68rem; text-transform: uppercase; display: flex; align-items: center; font-weight: bold; margin-right: 0; white-space: nowrap;">Chat:</label>
                    <select id="conversation-select" class="workspace-input" style="padding: 3px; font-size: 0.72rem; cursor: pointer; flex: 1 1 auto; min-width: 0;">
                        <option value="">Loading conversations...</option>
                    </select>
                </div>
                <button id="new-chat-btn" class="workspace-btn" style="height: 26px; font-size: 0.68rem; padding: 0 6px; white-space: nowrap; flex: 0 0 auto;">+ New</button>
            </div>

            <!-- Conversation Artifacts List -->
            <div id="conversation-artifacts-section" class="section-box artifacts-section collapsed" style="flex: 0 0 auto; max-height: 28%; margin-bottom: 4px;">
                <div class="section-title">
                    <span>Conversation Artifacts</span>
                    <div class="section-title-actions">
                        <button id="toggle-artifacts-btn" class="btn-secondary icon-btn artifact-toggle-btn" type="button" aria-label="Show artifacts" title="Show artifacts" aria-expanded="false" aria-controls="artifacts-list-panel">
                            <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <button id="refresh-artifacts-btn" class="btn-secondary icon-btn" type="button" aria-label="Refresh artifacts" title="Refresh artifacts">
                            <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M21 12a9 9 0 0 1-15.5 6.2"></path>
                                <path d="M3 12A9 9 0 0 1 18.5 5.8"></path>
                                <path d="M18 2v4h4"></path>
                                <path d="M6 22v-4H2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="artifacts-list-panel" class="section-content" style="padding: 0;" hidden>
                    <ul id="artifacts-list-display" class="file-list">
                        <!-- Populated dynamically -->
                        <li class="idle-state" style="padding: 12px 8px; font-size: 0.8rem;">No artifacts generated.</li>
                    </ul>
                </div>
            </div>

            <!-- Conversation Transcript Chat History -->
            <div class="section-box" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="section-title">
                    <span>Conversation Log</span>
                    <button id="refresh-transcript-btn" class="btn-secondary icon-btn" type="button" aria-label="Refresh conversation log" title="Refresh conversation log">
                        <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M21 12a9 9 0 0 1-15.5 6.2"></path>
                            <path d="M3 12A9 9 0 0 1 18.5 5.8"></path>
                            <path d="M18 2v4h4"></path>
                            <path d="M6 22v-4H2"></path>
                        </svg>
                    </button>
                </div>
                <div id="transcript-chat-display" class="section-content" style="padding: 4px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; min-height: 0;">
                    <!-- Populated dynamically with bubbles -->
                    <div class="idle-state">No chat messages found.</div>
                </div>
                <!-- Accept Changes Banner -->
                <div id="accept-changes-banner" class="accept-changes-banner hidden">
                    <span>Uncommitted changes in workspace</span>
                    <button id="accept-changes-btn" class="workspace-btn">Accept Changes</button>
                </div>
                <!-- Chat Message Sender Input bar -->
                <div class="workspace-selector-box chat-input-bar" style="border-top: 1px solid var(--border-muted); padding: 4px;">
                    <div class="workspace-input-group" style="display: flex; gap: 4px; width: 100%;">
                        <input type="text" id="chat-message-input" class="workspace-input" placeholder="Type a message..." style="padding: 4px; font-size: 0.8rem; flex: 1; min-width: 0;" />
                        <button id="chat-send-btn" class="workspace-btn" style="height: 30px; font-size: 0.75rem; padding: 0 10px; flex: 0 0 auto;">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 4: Workspace -->
        <div id="state-tab" class="tab-view">
            <div class="state-split">
                <!-- File Explorer -->
                <div class="section-box">
                    <div class="section-title">
                        <span>Workspace Files</span>
                        <button id="refresh-files-btn" class="btn-secondary icon-btn" type="button" aria-label="Refresh workspace files" title="Refresh workspace files">
                            <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M21 12a9 9 0 0 1-15.5 6.2"></path>
                                <path d="M3 12A9 9 0 0 1 18.5 5.8"></path>
                                <path d="M18 2v4h4"></path>
                                <path d="M6 22v-4H2"></path>
                            </svg>
                        </button>
                    </div>
                    <!-- Breadcrumbs for folder navigation -->
                    <div id="file-breadcrumbs" class="breadcrumb">
                        <span>workspace/</span>
                    </div>
                    <div class="section-content" style="padding: 0;">
                        <ul id="file-list-display" class="file-list">
                            <!-- Populated dynamically -->
                            <li class="idle-state">Loading workspace files...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Tab Navigation Bar -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-target="terminal-tab" type="button" aria-label="Terminal" title="Terminal">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m4 17 6-6-6-6"></path>
                <path d="M12 19h8"></path>
            </svg>
        </button>
        <button class="tab-btn" data-target="approvals-tab" type="button" aria-label="Approvals" title="Approvals">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6 9 17l-5-5"></path>
            </svg>
            <span id="approval-badge" class="badge hidden">1</span>
        </button>
        <button class="tab-btn" data-target="conversation-tab" type="button" aria-label="Chat and tasks" title="Chat and tasks">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
                <path d="M8 9h8"></path>
                <path d="M8 13h5"></path>
            </svg>
        </button>
        <button class="tab-btn" data-target="state-tab" type="button" aria-label="Workspace" title="Workspace">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
        </button>
    </nav>

    <!-- File View/Edit Overlay Modal -->
    <div id="file-viewer-overlay" class="overlay">
        <div class="overlay-header">
            <span id="overlay-filename" class="overlay-title">file.txt</span>
        </div>
        <textarea id="overlay-editor" class="editor-textarea" spellcheck="false" placeholder="Loading file contents..."></textarea>
        <div class="overlay-actions">
            <button id="editor-cancel-btn" class="overlay-btn">Close</button>
            <button id="editor-save-btn" class="overlay-btn">Save</button>
        </div>
    </div>

    <!-- Artifact Visual Viewer Overlay Modal -->
    <div id="artifact-viewer-overlay" class="overlay">
        <div class="overlay-header">
            <span id="artifact-filename" class="overlay-title">artifact.md</span>
        </div>
        <div id="artifact-rendered-content" class="section-content" style="padding: 16px; overflow-y: auto; flex: 1;">
            <!-- Rendered HTML goes here -->
        </div>
        <div class="overlay-actions">
            <button id="artifact-close-btn" class="overlay-btn" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- xterm.js CDN files -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <!-- Markdown parsing & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Application Logic -->
    <script src="/static/app.js?v=1.0.9"></script>
</body>
</html>
