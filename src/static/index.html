<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Link - Mobile Workspace</title>
    <!-- xterm.css from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header>
        <h1>Gravity Link</h1>
        <div class="status-indicator">
            <span id="ws-status-dot" class="status-dot"></span>
            <span id="ws-status-text">Disconnected</span>
        </div>
    </header>

    <!-- Workspace Selector -->
    <div class="workspace-selector-box" style="display: flex; flex-direction: column; gap: 6px; padding: 8px 12px;">
        <!-- Recent Workspaces Dropdown -->
        <div class="workspace-input-group">
            <label for="workspace-recent-select" style="font-size: 0.7rem; text-transform: uppercase; font-weight: bold; display: flex; align-items: center; width: 60px;">Recent:</label>
            <select id="workspace-recent-select" class="workspace-input" style="padding: 6px; font-size: 0.75rem; cursor: pointer; flex: 1;">
                <option value="">Loading workspaces...</option>
            </select>
        </div>
        <!-- Manual/New Workspace Input -->
        <div class="workspace-input-group">
            <label for="workspace-path-input" style="font-size: 0.7rem; text-transform: uppercase; font-weight: bold; display: flex; align-items: center; width: 60px;">Path:</label>
            <input type="text" id="workspace-path-input" class="workspace-input" placeholder="/path/to/project..." style="padding: 6px; font-size: 0.75rem;" />
            <button id="workspace-select-btn" class="workspace-btn" style="height: 30px; font-size: 0.7rem; padding: 0 12px; display: flex; align-items: center; justify-content: center;">Set</button>
        </div>
    </div>

    <!-- Main Views -->
    <main>
        <!-- Tab 1: Terminal -->
        <div id="terminal-tab" class="tab-view active">
            <div id="terminal-container" class="terminal-container"></div>
            <!-- Mobile Terminal Keypad Helpers -->
            <div class="terminal-keypad">
                <button class="keypad-btn" data-key="Esc">ESC</button>
                <button class="keypad-btn" data-key="Tab">TAB</button>
                <button class="keypad-btn" data-key="Ctrl">CTRL</button>
                <button class="keypad-btn" data-key="ArrowUp">▲</button>
                <button class="keypad-btn" data-key="ArrowDown">▼</button>
                <button class="keypad-btn" data-key="ArrowLeft">◀</button>
                <button class="keypad-btn" data-key="ArrowRight">▶</button>
                <button class="keypad-btn" data-key="Clear">CLS</button>
            </div>
        </div>

        <!-- Tab 2: Approvals -->
        <div id="approvals-tab" class="tab-view">
            <div id="pending-approval-container">
                <div class="idle-state">
                    Checking approval status...
                </div>
            </div>
        </div>

        <!-- Tab 3: Conversation & Tasks (New) -->
        <div id="conversation-tab" class="tab-view">
            <!-- Dropdown selector for conversations -->
            <div class="workspace-selector-box" style="border-bottom: 1px solid var(--border-muted); margin-bottom: 12px; padding: 4px 8px;">
                <div class="workspace-input-group">
                    <label for="conversation-select" style="font-size: 0.75rem; text-transform: uppercase; display: flex; align-items: center; font-weight: bold; margin-right: 8px;">Chat Session:</label>
                    <select id="conversation-select" class="workspace-input" style="padding: 4px; font-size: 0.75rem; cursor: pointer; flex: 1;">
                        <option value="">Loading conversations...</option>
                    </select>
                </div>
            </div>

            <!-- Background Commands / Tasks Section -->
            <div class="section-box" style="max-height: 35%; margin-bottom: 12px;">
                <div class="section-title">
                    <span>Background Commands</span>
                    <button id="refresh-commands-btn" class="btn-secondary" style="font-size: 0.65rem; padding: 2px 6px; height: auto;">Refresh</button>
                </div>
                <div class="section-content" style="padding: 0;">
                    <ul id="commands-list-display" class="file-list">
                        <!-- Populated dynamically -->
                        <li class="idle-state" style="padding: 12px 8px; font-size: 0.8rem;">No active processes running.</li>
                    </ul>
                </div>
            </div>

            <!-- Conversation Transcript Chat History -->
            <div class="section-box" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <div class="section-title">
                    <span>Conversation Log</span>
                    <button id="refresh-transcript-btn" class="btn-secondary" style="font-size: 0.65rem; padding: 2px 6px; height: auto;">Refresh</button>
                </div>
                <div id="transcript-chat-display" class="section-content" style="background-color: #000; padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; min-height: 220px; max-height: 45vh;">
                    <!-- Populated dynamically with bubbles -->
                    <div class="idle-state">No chat messages found.</div>
                </div>
                <!-- Chat Message Sender Input bar -->
                <div class="workspace-selector-box" style="border-top: 1px solid var(--border-muted); padding: 8px; background-color: #0d0d0d;">
                    <div class="workspace-input-group" style="display: flex; gap: 8px; width: 100%;">
                        <input type="text" id="chat-message-input" class="workspace-input" placeholder="Type a message..." style="padding: 6px; font-size: 0.8rem; flex: 1;" />
                        <button id="chat-send-btn" class="workspace-btn" style="height: 32px; font-size: 0.75rem; padding: 0 12px;">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 4: Workspace & Docs (Modified) -->
        <div id="state-tab" class="tab-view">
            <div class="state-split">
                <!-- Conversation Artifacts List -->
                <div class="section-box" style="max-height: 35%;">
                    <div class="section-title">
                        <span>Conversation Artifacts</span>
                        <button id="refresh-artifacts-btn" class="btn-secondary" style="font-size: 0.65rem; padding: 2px 6px; height: auto;">Refresh</button>
                    </div>
                    <div class="section-content" style="padding: 0;">
                        <ul id="artifacts-list-display" class="file-list">
                            <!-- Populated dynamically -->
                            <li class="idle-state" style="padding: 12px 8px; font-size: 0.8rem;">No artifacts generated.</li>
                        </ul>
                    </div>
                </div>

                <!-- File Explorer -->
                <div class="section-box">
                    <div class="section-title">
                        <span>Workspace Files</span>
                        <button id="refresh-files-btn" class="btn-secondary" style="font-size: 0.65rem; padding: 2px 6px; height: auto;">Refresh</button>
                    </div>
                    <!-- Breadcrumbs for folder navigation -->
                    <div id="file-breadcrumbs" class="breadcrumb">
                        <span>workspace/</span>
                    </div>
                    <div class="section-content" style="padding: 0;">
                        <ul id="file-list-display" class="file-list">
                            <!-- Populated dynamically -->
                            <li class="idle-state">Loading workspace files...</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Tab Navigation Bar -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-target="terminal-tab">
            Terminal
        </button>
        <button class="tab-btn" data-target="approvals-tab">
            Approvals <span id="approval-badge" class="badge hidden">1</span>
        </button>
        <button class="tab-btn" data-target="conversation-tab">
            Chat & Tasks
        </button>
        <button class="tab-btn" data-target="state-tab">
            Workspace & Docs
        </button>
    </nav>

    <!-- File View/Edit Overlay Modal -->
    <div id="file-viewer-overlay" class="overlay">
        <div class="overlay-header">
            <span id="overlay-filename" class="overlay-title">file.txt</span>
        </div>
        <textarea id="overlay-editor" class="editor-textarea" spellcheck="false" placeholder="Loading file contents..."></textarea>
        <div class="overlay-actions">
            <button id="editor-cancel-btn" class="overlay-btn">Close</button>
            <button id="editor-save-btn" class="overlay-btn">Save</button>
        </div>
    </div>

    <!-- Artifact Visual Viewer Overlay Modal -->
    <div id="artifact-viewer-overlay" class="overlay">
        <div class="overlay-header">
            <span id="artifact-filename" class="overlay-title">artifact.md</span>
        </div>
        <div id="artifact-rendered-content" class="section-content" style="background-color: #000; color: #fff; padding: 16px; overflow-y: auto; flex: 1;">
            <!-- Rendered HTML goes here -->
        </div>
        <div class="overlay-actions">
            <button id="artifact-close-btn" class="overlay-btn" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- xterm.js CDN files -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <!-- Application Logic -->
    <script src="/static/app.js"></script>
</body>
</html>
